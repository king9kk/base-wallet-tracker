<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Wallet Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0b0d; color: #fff; font-family: Arial, sans-serif; }
    .navbar { background: #1a1b1f; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .navbar h1 { color: #0052ff; font-size: 20px; }
    .connect-btn { background: #0052ff; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .connect-btn:hover { background: #0040cc; }
    .hero { text-align: center; padding: 80px 24px; }
    .hero h2 { font-size: 36px; margin-bottom: 16px; }
    .hero p { color: #888; font-size: 16px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>⬡ Base Wallet Tracker</h1>
    <button class="connect-btn">Connect Wallet</button>
  </nav>
  <div class="hero">
    <h2>Track Your Base Wallet</h2>
    <p>View balances, transactions and activity on Base network</p>
  </div>
</body>
</html>
